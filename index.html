<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Huis Zoeken Den Haag</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Leaflet.draw CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --groen: #4CAF50;
      --geel: #FFC107;
      --rood: #F44336;
      --sidebar-w: 320px;
      --toolbar-h: 56px;
      --accent: #1565C0;
      --bg: #f5f7fa;
      --card: #ffffff;
      --border: #dde1e7;
      --text: #1a1d23;
      --muted: #6b7280;
    }

    html, body { height: 100%; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; color: var(--text); }

    #toolbar {
      position: fixed; top: 0; left: 0; right: 0; height: var(--toolbar-h);
      background: var(--card); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px; padding: 0 16px;
      z-index: 1100; box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }
    #toolbar h1 { font-size: 16px; font-weight: 700; color: var(--accent); white-space: nowrap; margin-right: 8px; }

    .tb-sep { width: 1px; height: 32px; background: var(--border); margin: 0 4px; }

    .color-btn {
      width: 32px; height: 32px; border-radius: 50%; border: 3px solid transparent;
      cursor: pointer; transition: transform .15s, border-color .15s; flex-shrink: 0;
    }
    .color-btn:hover { transform: scale(1.15); }
    .color-btn.active { border-color: var(--text); transform: scale(1.15); }
    .color-btn[data-color="groen"] { background: var(--groen); }
    .color-btn[data-color="geel"]  { background: var(--geel); }
    .color-btn[data-color="rood"]  { background: var(--rood); }

    .tb-btn {
      display: flex; align-items: center; gap: 6px; padding: 0 14px; height: 36px;
      border-radius: 8px; border: 1px solid var(--border); background: var(--card);
      font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap;
      transition: background .15s, border-color .15s;
    }
    .tb-btn:hover { background: var(--bg); border-color: var(--accent); color: var(--accent); }
    .tb-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    #draw-mode-label {
      font-size: 12px; color: var(--muted); white-space: nowrap;
    }

    .tooltip-wrap { position: relative; }
    .tooltip-wrap .tip {
      display: none; position: absolute; top: 44px; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; font-size: 12px; border-radius: 6px;
      padding: 8px 12px; width: 220px; line-height: 1.5; z-index: 2000;
    }
    .tooltip-wrap:hover .tip { display: block; }

    #map {
      position: fixed; top: var(--toolbar-h); left: 0; right: 0; bottom: 0;
      z-index: 1;
    }

    #sidebar {
      position: fixed; top: var(--toolbar-h); right: 0; width: var(--sidebar-w);
      bottom: 0; background: var(--card); border-left: 1px solid var(--border);
      display: flex; flex-direction: column; z-index: 1050;
      transition: transform .25s ease; overflow: hidden;
    }
    #sidebar.collapsed { transform: translateX(var(--sidebar-w)); }

    #sidebar-toggle {
      position: fixed; top: calc(var(--toolbar-h) + 12px); right: 12px;
      width: 36px; height: 36px; border-radius: 8px; background: var(--accent);
      color: #fff; border: none; cursor: pointer; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      z-index: 1200; box-shadow: 0 2px 8px rgba(0,0,0,.2);
      transition: right .25s ease;
    }
    #sidebar:not(.collapsed) ~ #sidebar-toggle { right: calc(var(--sidebar-w) + 12px); }

    #sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
    #sidebar-header h2 { font-size: 14px; font-weight: 700; margin-bottom: 10px; }

    #house-search {
      width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border);
      font-size: 13px; background: var(--bg);
    }
    #house-search:focus { outline: none; border-color: var(--accent); }

    #sidebar-tabs {
      display: flex; border-bottom: 1px solid var(--border);
    }
    .stab {
      flex: 1; padding: 10px 0; text-align: center; font-size: 13px; font-weight: 600;
      cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s;
    }
    .stab.active { color: var(--accent); border-bottom-color: var(--accent); }

    #sidebar-body { flex: 1; overflow-y: auto; padding: 12px; }

    .section { display: none; }
    .section.active { display: block; }

    .sort-row { display: flex; justify-content: flex-end; margin-bottom: 8px; }
    .sort-row select {
      font-size: 12px; border: 1px solid var(--border); border-radius: 6px;
      padding: 4px 8px; background: var(--bg); cursor: pointer;
    }

    .list-item {
      display: flex; align-items: flex-start; gap: 10px; padding: 10px;
      border-radius: 10px; cursor: pointer; transition: background .15s;
      border: 1px solid transparent; margin-bottom: 6px;
    }
    .list-item:hover { background: var(--bg); border-color: var(--border); }
    .list-item .dot {
      width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; margin-top: 3px;
    }
    .list-item .info { flex: 1; min-width: 0; }
    .list-item .name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .list-item .sub { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .stars-sm { color: #f59e0b; font-size: 12px; letter-spacing: 1px; }

    #legend {
      position: fixed; bottom: 20px; left: 20px; background: var(--card);
      border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px;
      z-index: 900; box-shadow: 0 2px 8px rgba(0,0,0,.1); font-size: 13px;
    }
    #legend h3 { font-size: 12px; font-weight: 700; margin-bottom: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .leg-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .leg-dot { width: 14px; height: 14px; border-radius: 3px; opacity: .85; }

    #modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45);
      z-index: 3000; align-items: center; justify-content: center;
    }
    #modal-overlay.open { display: flex; }
    #modal {
      background: var(--card); border-radius: 16px; padding: 24px;
      width: 380px; max-width: 95vw; box-shadow: 0 8px 32px rgba(0,0,0,.2);
      max-height: 90vh; overflow-y: auto;
    }
    #modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }

    .field-label { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 4px; margin-top: 12px; }
    .field-label:first-of-type { margin-top: 0; }

    .modal-input {
      width: 100%; padding: 9px 12px; border-radius: 8px; border: 1px solid var(--border);
      font-size: 14px; background: var(--bg); font-family: inherit;
    }
    .modal-input:focus { outline: none; border-color: var(--accent); }
    textarea.modal-input { resize: vertical; min-height: 72px; }

    #star-rating { display: flex; gap: 4px; margin-top: 4px; }
    .star { font-size: 24px; cursor: pointer; color: #d1d5db; transition: color .1s; }
    .star.filled { color: #f59e0b; }

    .modal-actions { display: flex; gap: 8px; margin-top: 20px; }
    .btn-primary {
      flex: 1; padding: 10px; border-radius: 8px; border: none;
      background: var(--accent); color: #fff; font-weight: 700; font-size: 14px;
      cursor: pointer; transition: opacity .15s;
    }
    .btn-primary:hover { opacity: .88; }
    .btn-danger {
      padding: 10px 16px; border-radius: 8px; border: none;
      background: #fee2e2; color: var(--rood); font-weight: 700; font-size: 14px;
      cursor: pointer; transition: background .15s;
    }
    .btn-danger:hover { background: #fecaca; }
    .btn-cancel {
      padding: 10px 16px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text); font-weight: 600; font-size: 14px;
      cursor: pointer;
    }

    .area-popup input { width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; font-size: 13px; margin-bottom: 8px; }
    .area-popup button { padding: 5px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; }
    .area-popup .save-btn { background: var(--accent); color: #fff; margin-right: 6px; }
    .area-popup .del-btn  { background: #fee2e2; color: var(--rood); }

    /* nieuwe area tags styling */
    .area-tags-section {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .area-tags-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .area-tags-list,
    .area-tags-selected {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .area-tag-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid transparent;
      cursor: pointer;
      user-select: none;
      transition: transform .12s ease, opacity .12s ease, border-color .12s ease, background .12s ease;
    }
    .area-tag-chip:hover { transform: translateY(-1px); }
    .area-tag-chip .tag-plus,
    .area-tag-chip .tag-remove { font-weight: 800; line-height: 1; }
    .area-tag-chip.is-positive { background: #e8f5e9; color: #1b5e20; border-color: #b7dfba; }
    .area-tag-chip.is-negative { background: #ffebee; color: #b71c1c; border-color: #ffc9cf; }
    .area-tag-chip.is-selected { box-shadow: inset 0 0 0 2px rgba(0,0,0,.08); }
    .area-tag-chip.is-unselected { opacity: .9; background-image: linear-gradient(180deg, rgba(255,255,255,.45), rgba(255,255,255,.15)); }
    .area-tag-chip.is-custom { border-style: dashed; }
    .area-tags-empty { font-size: 12px; color: var(--muted); margin-top: 8px; }
    .custom-tag-box {
      margin-top: 12px;
      padding: 12px;
      border: 1px dashed var(--border);
      border-radius: 12px;
      background: #fafbfc;
    }
    .custom-tag-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .custom-tag-row input,
    .custom-tag-row select {
      flex: 1;
      min-width: 0;
      height: 38px;
      border-radius: 10px;
      border: 1px solid var(--border);
      padding: 0 10px;
      font-size: 14px;
      background: #fff;
    }
    .custom-tag-row .emoji-input { max-width: 84px; text-align: center; }
    .custom-tag-row button {
      height: 38px;
      border: none;
      border-radius: 10px;
      padding: 0 12px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    .sidebar-area-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .sidebar-area-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 700;
    }
    .sidebar-area-tag.positive { background: #e8f5e9; color: #1b5e20; }
    .sidebar-area-tag.negative { background: #ffebee; color: #b71c1c; }

    .house-circle-icon {}
    #toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: 8px 18px; border-radius: 20px;
      font-size: 13px; z-index: 5000; opacity: 0;
      transition: opacity .3s; pointer-events: none;
    }
    #toast.show { opacity: 1; }

    .leaflet-draw-toolbar a { background-color: var(--card) !important; }

    #sidebar-body::-webkit-scrollbar { width: 5px; }
    #sidebar-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    #sidebar-handle {
      display: none; width: 40px; height: 4px; background: var(--border);
      border-radius: 2px; margin: 10px auto 4px; flex-shrink: 0;
    }

    @media (max-width: 768px) {
      :root { --sidebar-w: min(100vw, 100%); }
      #sidebar {
        width: 100%;
        top: auto;
        left: 0;
        right: 0;
        bottom: 0;
        height: 42vh;
        max-height: 78vh;
        border-left: none;
        border-top: 1px solid var(--border);
        border-top-left-radius: 16px;
        border-top-right-radius: 16px;
      }
      #sidebar.collapsed { transform: translateY(calc(100% - 54px)); }
      #sidebar-toggle { display: none; }
      #sidebar-handle { display: block; }
      #legend { left: 12px; bottom: calc(42vh + 16px); max-width: calc(100vw - 24px); }
      #modal { width: min(96vw, 420px); padding: 18px; }
      .custom-tag-row { flex-direction: column; }
      .custom-tag-row .emoji-input { max-width: none; }
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <h1>Huis Zoeken</h1>

    <div class="tb-sep"></div>

    <button class="color-btn active" data-color="groen" title="Groen"></button>
    <button class="color-btn" data-color="geel" title="Geel"></button>
    <button class="color-btn" data-color="rood" title="Rood"></button>

    <div class="tb-sep"></div>

    <button id="draw-polygon" class="tb-btn">Polygon</button>
    <button id="draw-rectangle" class="tb-btn">Rectangle</button>

    <div class="tooltip-wrap">
      <button class="tb-btn">?</button>
      <div class="tip">
        Kies een kleur, teken een wijk op de kaart en geef daarna een naam. Klik op een huis-marker om details op te slaan.
      </div>
    </div>

    <div id="draw-mode-label"></div>
  </div>

  <div id="map"></div>

  <aside id="sidebar" class="collapsed">
    <div id="sidebar-handle"></div>

    <div id="sidebar-header">
      <h2>Overzicht</h2>
      <input id="house-search" type="text" placeholder="Zoek huis..." />
    </div>

    <div id="sidebar-tabs">
      <div class="stab active" data-tab="huizen">Huizen</div>
      <div class="stab" data-tab="wijken">Wijken</div>
    </div>

    <div id="sidebar-body">
      <section id="huizen-section" class="section active">
        <div class="sort-row">
          <select id="house-sort">
            <option value="rating-desc">Sterren hoog → laag</option>
            <option value="rating-asc">Sterren laag → hoog</option>
            <option value="name-asc">Naam A → Z</option>
            <option value="name-desc">Naam Z → A</option>
          </select>
        </div>
        <div id="house-list"></div>
      </section>

      <section id="wijken-section" class="section">
        <div id="area-list"></div>
      </section>
    </div>
  </aside>

  <button id="sidebar-toggle">☰</button>

  <div id="legend">
    <h3>Legenda</h3>
    <div class="leg-row"><span class="leg-dot" style="background: var(--groen);"></span> Goede zone</div>
    <div class="leg-row"><span class="leg-dot" style="background: var(--geel);"></span> Twijfelzone</div>
    <div class="leg-row"><span class="leg-dot" style="background: var(--rood);"></span> Minder geschikt</div>
  </div>

  <div id="modal-overlay">
    <div id="modal">
      <h3 id="modal-title">Huis toevoegen</h3>

      <div class="field-label">Naam</div>
      <input id="house-name" class="modal-input" type="text" placeholder="Bijv. Appelstraat 12" />

      <div class="field-label">Beoordeling</div>
      <div id="star-rating">
        <span class="star" data-star="1">★</span>
        <span class="star" data-star="2">★</span>
        <span class="star" data-star="3">★</span>
        <span class="star" data-star="4">★</span>
        <span class="star" data-star="5">★</span>
      </div>

      <div class="field-label">Notities</div>
      <textarea id="house-notes" class="modal-input" placeholder="Wat vind je van dit huis?"></textarea>

      <div class="field-label">Link</div>
      <input id="house-link" class="modal-input" type="url" placeholder="https://..." />

      <div class="modal-actions">
        <button id="save-house" class="btn-primary">Opslaan</button>
        <button id="delete-house" class="btn-danger" type="button">Verwijderen</button>
        <button id="cancel-house" class="btn-cancel" type="button">Annuleren</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

  <!-- Laat jouw bestaande Firebase config staan -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase, ref, push, set, update, remove, onChildAdded, onChildChanged, onChildRemoved
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    // ----- JOUW EIGEN FIREBASE CONFIG HIER LATEN STAAN -----
const firebaseConfig = {
  apiKey: "AIzaSyChOTJn4_ifTBTAW30OULb8pCnp0TSOLTQ",
  authDomain: "house-557b5.firebaseapp.com",
  databaseURL: "https://house-557b5-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "house-557b5",
  storageBucket: "house-557b5.firebasestorage.app",
  messagingSenderId: "617323482984",
  appId: "1:617323482984:web:23bc8167b2ee8bbdae10dd"
};

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const areasRef = ref(db, 'areas');
    const housesRef = ref(db, 'houses');

    const map = L.map('map', { zoomControl: true }).setView([52.0705, 4.3007], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    const drawnItems = new L.FeatureGroup().addTo(map);

    const areaLayers = {};
    const houseLayers = {};

    // nieuwe helpers voor area tags
    const PRESET_AREA_TAGS = [
      { id: 'kindvriendelijk', label: 'kindvriendelijk', tone: 'positive', emoji: '🧒', preset: true },
      { id: 'winkels-10-min-lopen', label: 'winkels 10 min lopen', tone: 'positive', emoji: '🛍️', preset: true },
      { id: 'basisschool', label: 'basisschool', tone: 'positive', emoji: '🏫', preset: true },
      { id: 'kinderopvang', label: 'kinderopvang', tone: 'positive', emoji: '🍼', preset: true },
      { id: 'park', label: 'park', tone: 'positive', emoji: '🌳', preset: true },
      { id: 'speeltuin', label: 'speeltuin', tone: 'positive', emoji: '🛝', preset: true },
      { id: 'veel-parkeer', label: 'veel parkeer', tone: 'positive', emoji: '🅿️', preset: true },
      { id: 'rustig', label: 'rustig', tone: 'positive', emoji: '😌', preset: true },
      { id: 'middel-parkeer', label: 'middel parkeer', tone: 'negative', emoji: '🚗', preset: true },
      { id: 'weinig-parkeer', label: 'weinig parkeer', tone: 'negative', emoji: '🚫', preset: true },
      { id: 'sociaal-in-de-buurt', label: 'sociaal in de buurt', tone: 'negative', emoji: '📢', preset: true }
    ];

    let selectedColor = 'groen';
    let currentDrawMode = null;
    let selectedHouseId = null;
    let selectedHouseRating = 0;

    const colorMap = {
      groen: getCssVar('--groen'),
      geel: getCssVar('--geel'),
      rood: getCssVar('--rood')
    };

    function getCssVar(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toast.classList.remove('show'), 1800);
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function slugifyTag(value) {
      return String(value || '')
        .toLowerCase()
        .trim()
        .replace(/\s+/g, '-')
        .replace(/[^a-z0-9\-]/g, '')
        .replace(/-+/g, '-')
        .replace(/^-|-$/g, '');
    }

    function normalizeTone(value) {
      return value === 'negative' ? 'negative' : 'positive';
    }

    function normalizeAreaTags(tags) {
      if (!Array.isArray(tags)) return [];
      const seen = new Set();
      return tags.map(tag => {
        if (!tag || typeof tag !== 'object') return null;
        const label = String(tag.label || '').trim();
        if (!label) return null;
        const id = slugifyTag(tag.id || label);
        if (!id || seen.has(id)) return null;
        seen.add(id);
        return {
          id,
          label,
          tone: normalizeTone(tag.tone),
          emoji: String(tag.emoji || '🏷️').trim() || '🏷️',
          preset: !!tag.preset
        };
      }).filter(Boolean);
    }

    function getAreaTags(areaId) {
      const layer = areaLayers[areaId];
      if (!layer || !layer.data) return [];
      return normalizeAreaTags(layer.data.tags || []);
    }

    function saveAreaTags(areaId, tags) {
      update(ref(db, `areas/${areaId}`), { tags: normalizeAreaTags(tags) });
    }

    function toggleAreaPresetTag(areaId, rawTagId) {
      const tagId = slugifyTag(rawTagId);
      const preset = PRESET_AREA_TAGS.find(tag => tag.id === tagId);
      if (!preset) return;
      const current = getAreaTags(areaId);
      const exists = current.some(tag => tag.id === tagId);
      const next = exists
        ? current.filter(tag => tag.id !== tagId)
        : [...current, { ...preset }];
      saveAreaTags(areaId, next);
    }

    function addCustomAreaTag(areaId) {
      const labelInput = document.getElementById(`custom-tag-label-${areaId}`);
      const toneInput = document.getElementById(`custom-tag-tone-${areaId}`);
      const emojiInput = document.getElementById(`custom-tag-emoji-${areaId}`);
      if (!labelInput || !toneInput || !emojiInput) return;

      const label = labelInput.value.trim();
      const tone = normalizeTone(toneInput.value);
      const emoji = (emojiInput.value.trim() || '🏷️').slice(0, 2);

      if (!label) {
        alert('Vul eerst een tagnaam in.');
        labelInput.focus();
        return;
      }

      const current = getAreaTags(areaId);
      const id = slugifyTag(label);
      const withoutSame = current.filter(tag => tag.id !== id);
      withoutSame.push({ id, label, tone, emoji, preset: false });
      saveAreaTags(areaId, withoutSame);

      labelInput.value = '';
      emojiInput.value = '🏷️';
      toneInput.value = 'positive';
    }

    function removeCustomAreaTag(areaId, rawTagId) {
      const tagId = slugifyTag(rawTagId);
      const current = getAreaTags(areaId);
      saveAreaTags(areaId, current.filter(tag => tag.id !== tagId));
    }

    function renderAreaTagChip(areaId, tag, selected) {
      const toneClass = tag.tone === 'negative' ? 'is-negative' : 'is-positive';
      const stateClass = selected ? 'is-selected' : 'is-unselected';
      const affordance = selected
        ? '<span class="tag-remove">✕</span>'
        : '<span class="tag-plus">+</span>';

      return `
        <button
          type="button"
          class="area-tag-chip ${toneClass} ${stateClass} ${tag.preset ? '' : 'is-custom'}"
          onclick="${tag.preset ? `toggleAreaPresetTag('${areaId}', '${tag.id}')` : `removeCustomAreaTag('${areaId}', '${tag.id}')`}"
          title="${selected ? 'Verwijderen' : 'Toevoegen'}"
        >
          <span>${escapeHtml(tag.emoji)}</span>
          <span>${escapeHtml(tag.label)}</span>
          ${affordance}
        </button>
      `;
    }

    function renderSidebarAreaTags(tags) {
      const normalized = normalizeAreaTags(tags);
      if (!normalized.length) return '';
      return `
        <div class="sidebar-area-tags">
          ${normalized.map(tag => `
            <span class="sidebar-area-tag ${tag.tone}">${escapeHtml(tag.emoji)} ${escapeHtml(tag.label)}</span>
          `).join('')}
        </div>
      `;
    }

    const drawControl = new L.Control.Draw({
      position: 'topleft',
      draw: {
        polyline: false,
        circle: false,
        circlemarker: false,
        marker: false,
        polygon: {
          allowIntersection: false,
          showArea: true,
          shapeOptions: { color: colorMap[selectedColor], weight: 2, fillOpacity: 0.22 }
        },
        rectangle: {
          shapeOptions: { color: colorMap[selectedColor], weight: 2, fillOpacity: 0.18 }
        }
      },
      edit: {
        featureGroup: drawnItems,
        edit: false,
        remove: false
      }
    });
    map.addControl(drawControl);

    function updateDrawButtons() {
      document.getElementById('draw-polygon').classList.toggle('active', currentDrawMode === 'polygon');
      document.getElementById('draw-rectangle').classList.toggle('active', currentDrawMode === 'rectangle');
      document.getElementById('draw-mode-label').textContent =
        currentDrawMode ? `Tekenen: ${currentDrawMode}` : '';
    }

    function setSelectedColor(color) {
      selectedColor = color;
      document.querySelectorAll('.color-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.color === color);
      });
    }

    document.querySelectorAll('.color-btn').forEach(btn => {
      btn.addEventListener('click', () => setSelectedColor(btn.dataset.color));
    });

    document.getElementById('draw-polygon').addEventListener('click', () => {
      currentDrawMode = 'polygon';
      updateDrawButtons();
      new L.Draw.Polygon(map, {
        allowIntersection: false,
        showArea: true,
        shapeOptions: { color: colorMap[selectedColor], weight: 2, fillOpacity: 0.22 }
      }).enable();
    });

    document.getElementById('draw-rectangle').addEventListener('click', () => {
      currentDrawMode = 'rectangle';
      updateDrawButtons();
      new L.Draw.Rectangle(map, {
        shapeOptions: { color: colorMap[selectedColor], weight: 2, fillOpacity: 0.18 }
      }).enable();
    });

    map.on(L.Draw.Event.CREATED, (e) => {
      const layer = e.layer;
      const type = e.layerType;
      const color = selectedColor;

      const areaRef = push(areasRef);
      const id = areaRef.key;

      const latlngs = type === 'rectangle'
        ? layer.getLatLngs()[0]
        : layer.getLatLngs()[0];

      const areaData = {
        id,
        color,
        name: 'Nieuwe wijk',
        type,
        latlngs: JSON.stringify(latlngs),
        tags: []
      };

      set(areaRef, areaData);
      currentDrawMode = null;
      updateDrawButtons();
    });

    function buildAreaPopupHtml(data) {
      const selectedTags = normalizeAreaTags(data.tags || []);
      const selectedTagIds = new Set(selectedTags.map(tag => tag.id));
      const presetTagsHtml = PRESET_AREA_TAGS.map(tag => renderAreaTagChip(data.id, tag, selectedTagIds.has(tag.id))).join('');
      const customTags = selectedTags.filter(tag => !tag.preset);

      const selectedTagsPreview = selectedTags.length
        ? `<div class="area-tags-selected">${selectedTags.map(tag => `
            <span class="sidebar-area-tag ${tag.tone}">${escapeHtml(tag.emoji)} ${escapeHtml(tag.label)}</span>
          `).join('')}</div>`
        : '<div class="area-tags-empty">Nog geen tags gekozen.</div>';

      const customTagsHtml = customTags.length
        ? `<div class="area-tags-selected">${customTags.map(tag => renderAreaTagChip(data.id, tag, true)).join('')}</div>`
        : '<div class="area-tags-empty">Nog geen eigen tags toegevoegd.</div>';

      return `
        <div class="area-popup">
          <h4>Wijk bewerken</h4>
          <div style="display:flex; gap:8px; align-items:center;">
            <input id="area-name-${data.id}" value="${escapeHtml(data.name || '')}" placeholder="Wijknaam" />
            <button class="save-btn" onclick="saveAreaName('${data.id}')">Opslaan</button>
          </div>

          <div class="area-tags-section">
            <div class="area-tags-title">Gekozen tags</div>
            ${selectedTagsPreview}
          </div>

          <div class="area-tags-section">
            <div class="area-tags-title">Snelle tags</div>
            <div class="area-tags-list">${presetTagsHtml}</div>
          </div>

          <div class="area-tags-section">
            <div class="area-tags-title">Eigen tag toevoegen</div>
            <div class="custom-tag-box">
              <div class="custom-tag-row">
                <input id="custom-tag-label-${data.id}" type="text" placeholder="Bijv. dichtbij tram" />
                <input id="custom-tag-emoji-${data.id}" class="emoji-input" type="text" value="🏷️" placeholder="🏷️" />
              </div>
              <div class="custom-tag-row">
                <select id="custom-tag-tone-${data.id}">
                  <option value="positive">Positief</option>
                  <option value="negative">Negatief</option>
                </select>
                <button type="button" onclick="addCustomAreaTag('${data.id}')">Tag toevoegen</button>
              </div>
              ${customTagsHtml}
            </div>
          </div>

          <button class="del-btn" onclick="deleteArea('${data.id}')">Verwijder wijk</button>
          <div style="margin-top:8px; font-size:12px; color:var(--muted);">Tip: dubbelklik / dubbeltap op de vorm om naam en tags aan te passen.</div>
        </div>
      `;
    }

    function parseLatLngs(latlngs) {
      try {
        return JSON.parse(latlngs);
      } catch (e) {
        return [];
      }
    }

    function makeAreaLayer(data) {
      const latlngs = parseLatLngs(data.latlngs);
      const color = colorMap[data.color] || colorMap.groen;

      let layer;
      if (data.type === 'rectangle') {
        layer = L.polygon(latlngs, { color, weight: 2, fillOpacity: 0.18 });
      } else {
        layer = L.polygon(latlngs, { color, weight: 2, fillOpacity: 0.22 });
      }

      layer.data = {
        ...data,
        tags: normalizeAreaTags(data.tags || [])
      };

      layer.on('dblclick', () => {
        layer.bindPopup(buildAreaPopupHtml(layer.data), { maxWidth: 360 }).openPopup();
      });

      let lastTap = 0;
      layer.on('click', () => {
        const now = Date.now();
        if (now - lastTap < 350) {
          layer.bindPopup(buildAreaPopupHtml(layer.data), { maxWidth: 360 }).openPopup();
        }
        lastTap = now;
      });

      return layer;
    }

    function renderArea(data) {
      if (areaLayers[data.id]) {
        drawnItems.removeLayer(areaLayers[data.id]);
        map.removeLayer(areaLayers[data.id]);
      }

      const layer = makeAreaLayer(data);
      areaLayers[data.id] = layer;
      drawnItems.addLayer(layer);
      layer.addTo(map);
      renderAreaList();
    }

    function deleteArea(id) {
      if (!confirm('Weet je zeker dat je deze wijk wilt verwijderen?')) return;
      remove(ref(db, `areas/${id}`));
    }

    function saveAreaName(id) {
      const input = document.getElementById(`area-name-${id}`);
      if (!input) return;
      update(ref(db, `areas/${id}`), { name: input.value.trim() || 'Naamloze wijk' });
      showToast('Wijk opgeslagen');
    }

    function renderAreaList() {
      const list = document.getElementById('area-list');
      const items = Object.values(areaLayers).map(layer => layer.data);

      list.innerHTML = '';

      if (!items.length) {
        list.innerHTML = `<div class="sub" style="padding:8px;">Nog geen wijken toegevoegd.</div>`;
        return;
      }

      items.forEach(a => {
        const latlngs = parseLatLngs(a.latlngs);
        const layer = areaLayers[a.id];
        if (!layer || !latlngs.length) return;

        const bounds = layer.getBounds();
        const kleur = colorMap[a.color] || colorMap.groen;

        const item = document.createElement('div');
        item.className = 'list-item';
        item.innerHTML = `
          <div class="dot" style="background:${kleur};"></div>
          <div class="info">
            <div class="name">${escapeHtml(a.name || 'Naamloze wijk')}</div>
            <div class="sub">${escapeHtml(a.type || 'shape')} · ${Math.round(bounds.getCenter().lat*1000)/1000}, ${Math.round(bounds.getCenter().lng*1000)/1000}</div>
            ${renderSidebarAreaTags(a.tags)}
          </div>
        `;
        item.addEventListener('click', () => {
          map.fitBounds(layer.getBounds(), { padding: [24, 24] });
          layer.bindPopup(buildAreaPopupHtml(layer.data), { maxWidth: 360 }).openPopup();
        });
        list.appendChild(item);
      });
    }

    function createHouseIcon(rating = 0) {
      const color = rating >= 4 ? '#16a34a' : rating >= 3 ? '#f59e0b' : '#ef4444';
      return L.divIcon({
        className: 'house-circle-icon',
        html: `<div style="
          width:18px;height:18px;border-radius:50%;
          background:${color};
          border:2px solid white;
          box-shadow:0 1px 4px rgba(0,0,0,.35);
        "></div>`,
        iconSize: [18, 18],
        iconAnchor: [9, 9]
      });
    }

    function renderStarsSm(rating) {
      const full = Math.max(0, Math.min(5, Number(rating || 0)));
      return '★'.repeat(full) + '☆'.repeat(5 - full);
    }

    function openHouseModal(house = null, latlng = null) {
      selectedHouseId = house?.id || null;
      selectedHouseRating = Number(house?.rating || 0);

      document.getElementById('modal-title').textContent = house ? 'Huis bewerken' : 'Huis toevoegen';
      document.getElementById('house-name').value = house?.name || '';
      document.getElementById('house-notes').value = house?.notes || '';
      document.getElementById('house-link').value = house?.link || '';
      document.getElementById('delete-house').style.display = house ? 'inline-block' : 'none';

      updateStarUi();

      document.getElementById('modal-overlay').classList.add('open');
      document.getElementById('save-house').onclick = async () => {
        const payload = {
          name: document.getElementById('house-name').value.trim(),
          notes: document.getElementById('house-notes').value.trim(),
          link: document.getElementById('house-link').value.trim(),
          rating: selectedHouseRating
        };

        if (house) {
          await update(ref(db, `houses/${house.id}`), payload);
          showToast('Huis bijgewerkt');
        } else if (latlng) {
          const newRef = push(housesRef);
          await set(newRef, {
            id: newRef.key,
            lat: latlng.lat,
            lng: latlng.lng,
            ...payload
          });
          showToast('Huis toegevoegd');
        }
        closeHouseModal();
      };

      document.getElementById('delete-house').onclick = async () => {
        if (!house) return;
        if (!confirm('Weet je zeker dat je dit huis wilt verwijderen?')) return;
        await remove(ref(db, `houses/${house.id}`));
        closeHouseModal();
        showToast('Huis verwijderd');
      };
    }

    function closeHouseModal() {
      document.getElementById('modal-overlay').classList.remove('open');
      selectedHouseId = null;
    }

    function updateStarUi() {
      document.querySelectorAll('.star').forEach(star => {
        star.classList.toggle('filled', Number(star.dataset.star) <= selectedHouseRating);
      });
    }

    document.querySelectorAll('.star').forEach(star => {
      star.addEventListener('click', () => {
        selectedHouseRating = Number(star.dataset.star);
        updateStarUi();
      });
    });

    document.getElementById('cancel-house').addEventListener('click', closeHouseModal);
    document.getElementById('modal-overlay').addEventListener('click', (e) => {
      if (e.target.id === 'modal-overlay') closeHouseModal();
    });

    map.on('click', (e) => {
      if (currentDrawMode) return;
      openHouseModal(null, e.latlng);
    });

    function renderHouse(data) {
      if (houseLayers[data.id]) {
        map.removeLayer(houseLayers[data.id]);
      }

      const marker = L.marker([data.lat, data.lng], {
        draggable: true,
        icon: createHouseIcon(data.rating)
      });

      marker.data = data;

      marker.on('click', () => openHouseModal(data));
      marker.on('dragend', async (e) => {
        const ll = e.target.getLatLng();
        await update(ref(db, `houses/${data.id}`), { lat: ll.lat, lng: ll.lng });
        showToast('Huis verplaatst');
      });

      marker.addTo(map);
      houseLayers[data.id] = marker;
      renderHouseList();
    }

    function renderHouseList() {
      const search = document.getElementById('house-search').value.trim().toLowerCase();
      const sort = document.getElementById('house-sort').value;
      const list = document.getElementById('house-list');

      let items = Object.values(houseLayers).map(layer => layer.data);

      if (search) {
        items = items.filter(h => {
          return [h.name, h.notes, h.link].some(v => String(v || '').toLowerCase().includes(search));
        });
      }

      items.sort((a, b) => {
        if (sort === 'rating-desc') return (b.rating || 0) - (a.rating || 0);
        if (sort === 'rating-asc') return (a.rating || 0) - (b.rating || 0);
        if (sort === 'name-desc') return String(b.name || '').localeCompare(String(a.name || ''));
        return String(a.name || '').localeCompare(String(b.name || ''));
      });

      list.innerHTML = '';

      if (!items.length) {
        list.innerHTML = `<div class="sub" style="padding:8px;">Nog geen huizen gevonden.</div>`;
        return;
      }

      items.forEach(h => {
        const item = document.createElement('div');
        item.className = 'list-item';
        item.innerHTML = `
          <div class="dot" style="background:${h.rating >= 4 ? '#16a34a' : h.rating >= 3 ? '#f59e0b' : '#ef4444'};"></div>
          <div class="info">
            <div class="name">${escapeHtml(h.name || 'Naamloos huis')}</div>
            <div class="sub">${escapeHtml(h.notes || '')}</div>
            <div class="stars-sm">${renderStarsSm(h.rating || 0)}</div>
          </div>
        `;
        item.addEventListener('click', () => {
          const layer = houseLayers[h.id];
          if (!layer) return;
          map.setView(layer.getLatLng(), Math.max(map.getZoom(), 15));
          openHouseModal(h);
        });
        list.appendChild(item);
      });
    }

    document.getElementById('house-search').addEventListener('input', renderHouseList);
    document.getElementById('house-sort').addEventListener('change', renderHouseList);

    document.querySelectorAll('.stab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.stab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(`${tab.dataset.tab}-section`).classList.add('active');
      });
    });

    const sidebar = document.getElementById('sidebar');
    const sidebarToggle = document.getElementById('sidebar-toggle');
    sidebarToggle.addEventListener('click', () => {
      sidebar.classList.toggle('collapsed');
    });

    document.getElementById('sidebar-handle').addEventListener('click', () => {
      sidebar.classList.toggle('collapsed');
    });

    onChildAdded(areasRef, snap => renderArea(snap.val()));
    onChildChanged(areasRef, snap => renderArea(snap.val()));
    onChildRemoved(areasRef, snap => {
      const id = snap.key;
      if (areaLayers[id]) {
        drawnItems.removeLayer(areaLayers[id]);
        map.removeLayer(areaLayers[id]);
        delete areaLayers[id];
      }
      renderAreaList();
    });

    onChildAdded(housesRef, snap => renderHouse(snap.val()));
    onChildChanged(housesRef, snap => renderHouse(snap.val()));
    onChildRemoved(housesRef, snap => {
      const id = snap.key;
      if (houseLayers[id]) {
        map.removeLayer(houseLayers[id]);
        delete houseLayers[id];
      }
      renderHouseList();
    });

    window.saveAreaName = saveAreaName;
    window.deleteArea = deleteArea;
    window.toggleAreaPresetTag = toggleAreaPresetTag;
    window.addCustomAreaTag = addCustomAreaTag;
    window.removeCustomAreaTag = removeCustomAreaTag;
  </script>
</body>
</html>
